<!doctype html>
<html lang="da">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Radikale Venstre – resolutionsdatabase</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-header">
    <div class="brand-mark" aria-hidden="true">R</div>
    <div>
      <p class="eyebrow">Demo</p>
      <h1>Radikale Venstre – resolutionsdatabase</h1>
      <p class="lede">Søg og filtrér i vedtagne landsmøde-resolutioner.</p>
    </div>
  </header>

  <main class="layout">
    <aside class="panel filters" aria-label="Filtre">
      <label for="search">Søg</label>
      <input id="search" type="search" placeholder="Fx open source, Gaza, tandlæge…" autocomplete="off" />

      <div class="filter-row">
        <label for="year">År</label>
        <select id="year"></select>
      </div>

      <div class="filter-row">
        <label for="chapter">Politikområde</label>
        <select id="chapter"></select>
      </div>

      <label class="checkbox">
        <input id="activeOnly" type="checkbox" checked />
        Kun gældende i dag
      </label>

      <button id="reset" type="button">Nulstil filtre</button>

      <div class="hint">
        <strong>Søgetip:</strong> Der søges i titel, tekst, kapitel og genererede søgeord.
      </div>
    </aside>

    <section class="content">
      <div class="toolbar">
        <p id="summary" class="summary">Indlæser…</p>
        <button id="copyLink" type="button">Kopiér link</button>
      </div>
      <div id="results" class="results" aria-live="polite"></div>
    </section>
  </main>

  <dialog id="detailsDialog">
    <article class="details">
      <button class="close" id="closeDialog" aria-label="Luk">×</button>
      <p id="detailMeta" class="meta"></p>
      <h2 id="detailTitle"></h2>
      <div id="detailBody" class="body-text"></div>
      <div id="detailKeywords" class="tags"></div>
    </article>
  </dialog>

  <script src="app.js"></script>
</body>
</html>
